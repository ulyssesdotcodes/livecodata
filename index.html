<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livecodata</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="icon" href="/icons/icon-512.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <!-- Feather icons, self-hosted (copied from the feather-icons package by
         build.js / watch.js) so the app has no third-party runtime dependency
         and works fully offline. Loaded globally so src/ui/icon.tsx can read
         window.feather.icons synchronously before main.ts runs. -->
    <script src="/assets/feather.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
